<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tumelo Sethosa | Data Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #020617;
  --text: #e2e8f0;
  --card: rgba(255,255,255,0.05);
}

.light-mode {
  --bg: #f8fafc;
  --text: #0f172a;
  --card: rgba(0,0,0,0.05);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:25px 8%;
}

nav a {
  margin-left:20px;
  text-decoration:none;
  color:#94a3b8;
}

/* HERO */
.hero {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:100px 8%;
  gap:40px;
}

.hero img {
  width:260px;
  border-radius:50%;
  box-shadow:0 0 40px rgba(56,189,248,0.3);
}

h1 {
  font-size:48px;
}

.typing {
  color:#38bdf8;
  margin-top:10px;
  height:24px;
}

/* BUTTONS */
.btn {
  padding:12px 18px;
  border-radius:8px;
  text-decoration:none;
  margin-right:10px;
  display:inline-block;
  margin-top:20px;
}

.btn-primary {
  background:#38bdf8;
  color:#020617;
}

/* CARDS */
.projects {
  padding:80px 8%;
}

.card {
  background: var(--card);
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

/* TOGGLE */
.toggle {
  cursor:pointer;
  padding:6px 12px;
  border:1px solid #334155;
  border-radius:6px;
}

/* ANIMATIONS */
.hidden {
  opacity:0;
  transform:translateY(30px);
  transition:0.6s;
}

.show {
  opacity:1;
  transform:translateY(0);
}

footer {
  text-align:center;
  padding:40px;
}
</style>
</head>

<body>

<nav>
  <h2>Tumelo Sethosa</h2>
  <div>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
    <span class="toggle" onclick="toggleTheme()">🌗</span>
  </div>
</nav>

<section class="hero hidden">
  <div>
    <h1>Data Engineer & Analyst</h1>
    <div class="typing" id="typing"></div>

    <a class="btn btn-primary" href="https://github.com/tumelo05" target="_blank">GitHub</a>
    <a class="btn btn-primary" href="https://linkedin.com/in/tumelo-sethosa" target="_blank">LinkedIn</a>
  </div>

  <img src="https://i.imgur.com/54Hykuy.jpeg" alt="profile">
</section>

<section class="projects hidden" id="projects">
  <h2>Projects</h2>

  <div class="card">
    <h3>Customer Analytics</h3>
    <p>SQL + Power BI dashboard solution</p>
  </div>

  <div class="card">
    <h3>Fleet Pipeline</h3>
    <p>Spark ETL pipeline with PostgreSQL</p>
  </div>

  <div class="card">
    <h3>CRM Backend</h3>
    <p>FastAPI + SQL backend</p>
  </div>
</section>

<section id="contact" class="hidden" style="padding:80px 8%">
  <h2>Contact</h2>
  <p>LinkedIn: <a href="https://linkedin.com/in/tumelo-sethosa" target="_blank">tumelo-sethosa</a></p>
</section>

<footer>
© <span id="year"></span> Tumelo Sethosa
</footer>

<script>
/* YEAR */
document.getElementById("year").textContent = new Date().getFullYear();

/* THEME TOGGLE */
function toggleTheme() {
  document.body.classList.toggle("light-mode");
}

/* TYPING EFFECT */
const roles = [
  "Building ETL Pipelines",
  "Designing Data Systems",
  "Creating BI Dashboards"
];

let i = 0, j = 0, current = "", isDeleting = false;

function type() {
  current = roles[i];
  document.getElementById("typing").textContent =
    current.substring(0, j);

  if(!isDeleting && j < current.length) {
    j++;
    setTimeout(type, 60);
  } else if(isDeleting && j > 0) {
    j--;
    setTimeout(type, 30);
  } else {
    isDeleting = !isDeleting;
    if(!isDeleting) i = (i + 1) % roles.length;
    setTimeout(type, 1000);
  }
}

type();

/* SCROLL ANIMATION */
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting) {
      entry.target.classList.add("show");
    }
  });
});

document.querySelectorAll(".hidden").forEach(el => observer.observe(el));
</script>

</body>
</html>
